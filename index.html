<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Мои привычки</h1>
        <button id="reset-all" class="reset-button">Сбросить всё</button>
      </header>

      <main class="habits-list">
        <article class="habit-card" data-habit-id="water">
          <div class="habit-main">
            <h2 class="habit-title" data-title>Пить воду</h2>
            <button class="edit-btn" type="button" aria-label="Редактировать название">✏️</button>
          </div>
          <div class="habit-controls">
            <button class="habit-btn" type="button">+1</button>
            <span class="habit-counter" data-counter>0</span>
          </div>
        </article>

        <article class="habit-card" data-habit-id="walk">
          <div class="habit-main">
            <h2 class="habit-title" data-title>Прогулка</h2>
            <button class="edit-btn" type="button" aria-label="Редактировать название">✏️</button>
          </div>
          <div class="habit-controls">
            <button class="habit-btn" type="button">+1</button>
            <span class="habit-counter" data-counter>0</span>
          </div>
        </article>

        <article class="habit-card" data-habit-id="reading">
          <div class="habit-main">
            <h2 class="habit-title" data-title>Чтение</h2>
            <button class="edit-btn" type="button" aria-label="Редактировать название">✏️</button>
          </div>
          <div class="habit-controls">
            <button class="habit-btn" type="button">+1</button>
            <span class="habit-counter" data-counter>0</span>
          </div>
        </article>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
  </html>
